# huginn — example configuration
#
# Drop this at ~/.config/huginn/config.toml (or $XDG_CONFIG_HOME/huginn/).
# Every field is optional: omit a key to use the built-in default. A missing or
# malformed file falls back to defaults — the prompt never fails to render.
#
# Colors accept two forms:
#   - ANSI name: "black" "red" "green" "yellow" "blue" "magenta" "cyan" "white"
#                and their "bright_" variants (e.g. "bright_blue").
#                These follow your terminal THEME — change the theme, the prompt
#                adapts automatically.
#   - Hex:       "#7aa2f7" (or shorthand "#abc"). An exact 24-bit color, fixed
#                regardless of terminal theme.

# Named color preset, applied before your own keys below. "huginn" (the
# default) is a Norse raven palette: graphite plumage, frost-blue highlights,
# rune-gold accents. Set "" to start from the bare built-in colors. Any key you
# set below still overrides the theme.
theme = "huginn"

# Visual style: "plain" (text + spaces) or "powerline" (colored blocks + arrows).
style = "plain"

# Put the prompt symbol on its own second line (type below the status row).
symbol_on_new_line = false

# Each segment has `color` (text/fg) and, for powerline, `bg` (block background).
# Omit bg to reuse color. The huginn theme sets contrasting fg/bg per segment.
[cwd]
color = "blue"

[git]
icon = ""          # branch glyph (Nerd Font); set "" to hide
color = "yellow"
dirty_color = "red"  # recolors the whole git segment when the tree is dirty
ahead_icon = "↑"     # before the count of commits to push (vs upstream)
behind_icon = "↓"    # before the count of commits to pull (vs upstream)
# Note: ahead/behind compares against the upstream git already knows locally —
# it never fetches, so counts reflect your last fetch/pull.

[node]
icon = ""          # node glyph (Nerd Font); set "" to hide
color = "green"
show_active_version = false # run `node --version` (async) to show the ACTIVE version
mismatch_color = "red"      # used when active version != version the project requests

# Last-command duration — shown only when a command was slow enough, so quick
# commands don't clutter the prompt. Humanized: "850ms", "1.5s", "2m30s", "1h2m".
[duration]
min_ms = 2000      # only show when the command took at least this long
color = "yellow"

[symbol]
char = "❯"
success_color = "green"
error_color = "red"
